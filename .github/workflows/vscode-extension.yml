name: VS Code Extension

on:
  push:
    tags:
      - "vscode-v*"
    paths:
      - "extensions/vscode-intract/**"
  pull_request:
    paths:
      - "extensions/vscode-intract/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode-intract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @vscode/vsce
      - run: node -e "require('./extension.js')"
      - run: vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-intract-vsix
          path: extensions/vscode-intract/*.vsix

  publish:
    if: startsWith(github.ref, 'refs/tags/vscode-v')
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: extensions/vscode-intract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @vscode/vsce
      - run: vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
