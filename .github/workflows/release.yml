name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: pytest -q
      - run: python -m intract validate examples/full-stack --manifest examples/full-stack/intract.yaml

  test-composite-action:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: examples/full-stack
          manifest: examples/full-stack/intract.yaml
          fail-on-error: "true"

  github-release:
    runs-on: ubuntu-latest
    needs: [validate, test-composite-action]
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: action.yml
