name: Intract

on:
  pull_request:
  push:
    branches: [main]

jobs:
  intract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: python -m intract check . --format sarif --output intract.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: intract.sarif
