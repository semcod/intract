name: Intract

on:
  pull_request:
  push:
    branches: [main]

jobs:
  intract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: pytest -q
      - run: python -m intract validate examples/full-stack --manifest examples/full-stack/intract.yaml
      - run: python -m intract duplicates examples/full-stack --threshold 0.5
      - run: python -m intract check . --format sarif --output intract.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: intract.sarif

  full-stack-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout vallm
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vallm
          path: vallm
          fetch-depth: 1
        continue-on-error: true
      - name: Checkout redup
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/redup
          path: redup
          fetch-depth: 1
        continue-on-error: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: chmod +x scripts/ci-full-stack.sh
      - run: bash scripts/ci-full-stack.sh
        env:
          VALLM_ROOT: ${{ github.workspace }}/vallm
          REDUP_ROOT: ${{ github.workspace }}/redup

  test-composite-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - uses: ./
        with:
          path: examples/full-stack
          manifest: examples/full-stack/intract.yaml
          fail-on-error: "true"
