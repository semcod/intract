name: Intract

on:
  pull_request:
  push:
    branches: [main]

jobs:
  intract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install intract
      - run: intract validate . --manifest intract.yaml --json
